name: Build Test and Release
run-name: ${{ github.actor }} is starting the build action.
on:
  push:
    branches:
    - '**'

permissions:
  contents: read
  packages: write
env:
  MAJOR_VERSION: 1
  REGISTRY: ghcr.io
  COMPONENT: todo-app

jobs:
  build_and_test:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 


    - name: build and test
      run: |
        echo "Building and testing the project..."
        # 1. Assign to local shell variables
        # This makes them available IMMEDIATELY in this run block
        BUILD_NUMBER="${{ env.MAJOR_VERSION }}.${{ github.run_number }}"
        FRONTEND_IMAGE_TAG="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.COMPONENT }}-frontend:$BUILD_NUMBER"
        BACKEND_IMAGE_TAG="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.COMPONENT }}-backend:$BUILD_NUMBER"

        # 2. Export them for the current shell session
        # Now any scripts called in this block can see these variables
        export FRONTEND_IMAGE_TAG
        export BACKEND_IMAGE_TAG

        # 3. Persist for FUTURE steps
        echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
        echo "FRONTEND_IMAGE_TAG=$FRONTEND_IMAGE_TAG" >> $GITHUB_ENV
        echo "BACKEND_IMAGE_TAG=$BACKEND_IMAGE_TAG" >> $GITHUB_ENV

        ./scripts/build.sh build_containers
        ./scripts/build.sh test_containers


    - name: Check for changes
      id: changes
      run: |
        BASE="${{ github.event.before }}"
        HEAD="${{ github.sha }}"
        echo "Base SHA: $BASE"
        echo "Head SHA: $HEAD"

        # Handle first commit or missing base
        if ! git cat-file -e $BASE^{commit} 2>/dev/null; then
          echo "Base commit not found, using full repo"
          CHANGED_FILES=$(git ls-files)
        else
          CHANGED_FILES=$(git diff --name-only $BASE $HEAD)
        fi
        echo "Changed files:"
        echo "$CHANGED_FILES"

        if echo "$CHANGED_FILES" | grep -E '^(frontend/|backend/|\.github/workflows/)'; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi


    - name: Log in to the Container registry only if publish-image branch
      if: github.ref == 'refs/heads/main' && steps.changes.outputs.changed == 'true'
      uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}


    - name: Push container images
      if: github.ref == 'refs/heads/main' && steps.changes.outputs.changed == 'true'
      run: |
        docker push $FRONTEND_IMAGE_TAG
        docker push $BACKEND_IMAGE_TAG
        echo "Containers pushed successfully!"

    - name: Scan yamls
      id: kube-lint-scan
      if: github.ref == 'refs/heads/main'
      uses: stackrox/kube-linter-action@v1
      with:
        directory: yamls
        config: .kube-linter/config.yaml

    - name: Release to argocd-publish branch
      if: github.ref == 'refs/heads/main'
      uses: dmnemec/copy_file_to_another_repo_action@main
      env:
        API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}
      with:
        source_file: 'kubernetes_deployment'
        destination_repo: 'lavank179/Todo-App-Kubernetes'
        destination_folder: 'kubernetes-deployments'
        user_email: 'chlavankumar179@gmail.com'
        user_name: 'lavank179'
        commit_message: 'Update new kubernetes manifests for argocd deployment - ${{ github.run_number }}'
        destination_branch: 'argocd-publish'
        destination_branch_create: argocd-publish
    - run: echo "Hurray!!! The app is eligible for global deploy🍏"