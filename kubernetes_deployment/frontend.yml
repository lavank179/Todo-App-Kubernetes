apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: todo-app
spec:
  selector:
    app: frontend
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 80
      # nodePort: 32752

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: todo-app
  annotations:
    kubernetes.io/change-cause: "version 1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: todo-app-kubernetes-todo-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "20Mi"
              cpu: "50m"
            limits:
              memory: "40Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
            timeoutSeconds: 5
          envFrom:
            - configMapRef:
                name: app-config
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - kind-cluster-worker
